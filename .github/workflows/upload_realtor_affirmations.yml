name: Realtor Affirmations – Daily YouTube Shorts

on:
  schedule:
    - cron: '0 10 * * *'   # 10:00 UTC = 14:00 Dubai time
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install moviepy pillow numpy pyyaml google-api-python-client google-auth-oauthlib
          sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Create images folder
        run: mkdir -p images_realtor
      - name: Decode token
        env:
          TOKEN: ${{ secrets.YOUTUBE_TOKEN_PICKLE_REALTOR }}
        run: echo "$TOKEN" | base64 -d > token.pickle
      - name: Create client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json
      - name: Run script
        run: python realtor_affirmations_video.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: realtor-affirmations-video
          path: realtor_affirmations_video.mp4
