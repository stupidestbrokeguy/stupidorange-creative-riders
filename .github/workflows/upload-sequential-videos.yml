name: Upload Sequential Videos

on:
  schedule:
    # Daily at 6:00 AM Dubai time (2:00 UTC)
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # Needed to commit state file

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib

      - name: Create folder for videos
        run: mkdir -p video_of_day

      - name: Decode YouTube token
        env:
          TOKEN: ${{ secrets.YOUTUBE_TOKEN_PICKLE }}
        run: echo "$TOKEN" | base64 -d > token.pickle

      - name: Create client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: echo "$CLIENT_SECRETS" > client_secrets.json

      - name: Run sequential upload
        run: python upload_sequential_videos.py

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: upload-log
          path: |
            video_sequence_state.json
