name: Daily YouTube Shorts

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          pip install pillow moviepy google-api-python-client google-auth-oauthlib PyMuPDF numpy
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Create required directories
        run: |
          mkdir -p extracted_date_pages
          mkdir -p daily_images
      
      - name: Create client_secrets.json (raw JSON)
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          echo "$CLIENT_SECRETS" > client_secrets.json
      
      - name: Decode token.pickle from base64
        env:
          TOKEN: ${{ secrets.YOUTUBE_TOKEN_PICKLE }}
        run: |
          echo "$TOKEN" | base64 -d > token.pickle
      
      - name: Run daily_shorts.py
        run: python daily_shorts.py
      
      - name: Upload artifacts (keep for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shorts-output
          path: |
            extracted_date_pages/*.mp4
            extracted_date_pages/*.png
            daily_images/*.png
            shorts_state.json
