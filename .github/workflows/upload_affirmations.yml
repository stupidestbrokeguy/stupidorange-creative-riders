name: Daily Affirmations – YouTube Shorts For Riders

on:
  schedule:
    # Runs daily at 12:00 UTC (16:00 Dubai time) – adjust as needed
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy pyyaml

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
        echo "✅ client_secrets.json created"

    - name: Decode token from secret
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN_PICKLE }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored"

    - name: Create images_affirmations directory
      run: |
        mkdir -p images_affirmations

    - name: Verify required files
      run: |
        if [ ! -f affirmations.yaml ]; then echo "❌ affirmations.yaml missing"; exit 1; fi
        if [ ! -f intros_affirmations.json ]; then echo "❌ intros_affirmations.json missing"; exit 1; fi
        if [ ! -d images_affirmations ]; then echo "❌ images_affirmations folder missing"; exit 1; fi
        echo "✅ All required files present"

    - name: Run affirmations video script
      run: python affirmations_video.py

    - name: Upload video as artifact (debug)
      uses: actions/upload-artifact@v4
      with:
        name: affirmations-video
        path: affirmations_video.mp4
        retention-days: 7
