name: Daily Affirmation - 30 Second Clip

on:
  schedule:
    - cron: '3 3 * * *'  # Runs at 3:03 AM UTC (7:03 AM Dubai time)
  workflow_dispatch:  # Manual trigger (uses current date when manually run)

jobs:
  send-affirmation:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        lfs: true
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyMuPDF moviepy google-api-python-client google-auth-oauthlib google-auth-httplib2 pillow numpy
    
    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    
    - name: Install ImageMagick (for text overlays)
      run: |
        sudo apt-get install -y imagemagick
        sudo sed -i 's/rights="none" pattern="PDF"/rights="read|write" pattern="PDF"/' /etc/ImageMagick-6/policy.xml || true
        sudo sed -i 's/rights="none" pattern="PS"/rights="read|write" pattern="PS"/' /etc/ImageMagick-6/policy.xml || true
    
    - name: Create client_secrets.json from secret
      run: |
        echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > client_secrets.json
        echo "✅ client_secrets.json created"
    
    - name: Decode token from secret
      run: |
        echo "${{ secrets.YOUTUBE_TOKEN_PICKLE }}" | base64 -d > token.pickle
        echo "✅ token.pickle restored"
    
    - name: Verify PDF exists
      run: |
        if [ ! -f your_document.pdf ]; then
          echo "❌ PDF file not found!"
          exit 1
        fi
        echo "✅ PDF file found ($(du -h your_document.pdf | cut -f1))"
    
    - name: Set today's date
      id: date
      run: |
        # Use current UTC date for scheduled runs
        # For manual runs, use the current date too (or allow override if needed)
        if [ "${{ github.event_name }}" = "schedule" ]; then
          TODAY=$(date +%Y-%m-%d)
          echo "📅 Schedule run - Using today's date: $TODAY"
        else
          # For manual runs, you can still override if you add the input back
          TODAY=$(date +%Y-%m-%d)
          echo "📅 Manual run - Using today's date: $TODAY"
        fi
        echo "date=$TODAY" >> $GITHUB_OUTPUT
    
    - name: Run Affirmation script
      run: |
        echo "🎬 Processing date: ${{ steps.date.outputs.date }}"
        python affirmation_extractor.py "${{ steps.date.outputs.date }}"
    
    - name: Upload video artifact
      uses: actions/upload-artifact@v4
      with:
        name: affirmation-video-${{ steps.date.outputs.date }}
        path: affirmation_pages/*_video.mp4
        retention-days: 30
      if: always()
    
    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: affirmation-image-${{ steps.date.outputs.date }}
        path: affirmation_pages/*.png
        retention-days: 30
      if: always()
    
    - name: Log completion
      run: |
        echo "✅ Daily affirmation processing complete for ${{ steps.date.outputs.date }}!"
        echo "📹 Check YouTube channel for the 30-second affirmation clip"
        
        # List created files
        echo ""
        echo "📁 Created files:"
        ls -la affirmation_pages/ || echo "No files found"
