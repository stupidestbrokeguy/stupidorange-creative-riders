name: Upload Sequential Realtor Videos

on:
  schedule:
    # Runs daily at 12:00 PM Dubai time (8:00 UTC)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install google-api-python-client google-auth-oauthlib

      - name: Create folders
        run: |
          mkdir -p video_of_day_realtor
          mkdir -p extracted_date_pages

      - name: Decode Realtor token
        env:
          TOKEN: ${{ secrets.YOUTUBE_TOKEN_PICKLE_REALTOR }}
        run: |
          echo "$TOKEN" | base64 -d > token.pickle

      - name: Create client_secrets.json
        env:
          CLIENT_SECRETS: ${{ secrets.YOUTUBE_CLIENT_SECRETS }}
        run: |
          echo "$CLIENT_SECRETS" > client_secrets.json

      - name: Run Realtor sequential upload
        run: python upload_sequential_realtor.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: realtor-sequential-output
          path: |
            video_sequence_state_realtor.json
            credits_realtor.json
